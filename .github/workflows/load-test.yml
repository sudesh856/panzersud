name: Load Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: 

env:
  SUDDPANZER_VERSION: "0.3.0"
  SCENARIO: "examples/load-test.yaml"

jobs:
  load-test:
    name: suddpanzer load test
    runs-on: ubuntu-latest
    # FIX 1: This allows the action to write the "Tests" report to your UI
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build suddpanzer
        # Simplest way: build it right here in the workspace
        run: go build -o suddpanzer ./cmd/main.go

      - name: Run load test
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        # FIX 2: Running it as ./suddpanzer ensures the runner always finds it
        run: |
          ./suddpanzer run \
            --scenario ${{ env.SCENARIO }} \
            --output junit \
            --output-file suddpanzer-results.xml

      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: suddpanzer-results.xml
          check_name: "suddpanzer load test"
          fail_on_failure: true

      - name: Generate JSON summary
        if: always()
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          ./suddpanzer run \
            --scenario ${{ env.SCENARIO }} \
            --output json \
            --output-file suddpanzer-summary.json || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: suddpanzer-results-${{ github.run_id }}
          path: |
            suddpanzer-results.xml
            suddpanzer-summary.json
          retention-days: 30